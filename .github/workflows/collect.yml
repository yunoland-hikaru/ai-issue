name: Newsroom-style Collection

on:
  schedule:
    # JST 08,10,12,14,16,18,20,22時台 = UTC 23,1,3,5,7,9,11,13時台。1日8スロット。
    # 分は:00を避ける（GitHubの定時実行は毎時0分が最も混雑し遅延/欠落しやすい）。
    - cron: '17 23,1,3,5,7,9,11,13 * * *'
  workflow_dispatch:       # 手動実行も可能（その場合は必ず1件収集）

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Maybe collect one article (newsroom-style)
        run: |
          # 実際の編集部のように、各スロットで確率的に0〜1本を不定の時間に収集する。
          # 手動実行(workflow_dispatch)は必ず収集。スケジュールは85%の確率で1本。
          # 1日8スロット × 採用率85% ≒ 1日6〜8本（5〜10本のレンジ）。
          if [ "${{ github.event_name }}" = "schedule" ] && [ $((RANDOM % 100)) -ge 85 ]; then
            echo "Skip this slot"
            exit 0
          fi

          # 0〜10分のランダム遅延で created_at を自然に散らす
          DELAY=$((RANDOM % 600))
          echo "Sleeping ${DELAY}s before collecting..."
          sleep "$DELAY"

          # ランダムなソースから1本（0=AI Times, 1=TechCrunch, 2=VentureBeat, 3=The Verge）
          SOURCE=$((RANDOM % 4))
          echo "→ collecting source=$SOURCE"

          # レスポンス本文とHTTPコードを両方取得（無言失敗を防ぐ）
          RESPONSE=$(curl -sS --max-time 180 -w $'\n%{http_code}' \
            -X POST "https://ai-issue.vercel.app/api/collect?source=$SOURCE&limit=1")
          HTTP_CODE=$(printf '%s' "$RESPONSE" | tail -n1)
          BODY=$(printf '%s' "$RESPONSE" | sed '$d')
          echo "HTTP $HTTP_CODE"
          echo "$BODY"

          # 1) HTTPエラーは即失敗
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::collect returned HTTP $HTTP_CODE"
            exit 1
          fi

          COLLECTED=$(printf '%s' "$BODY" | jq -r '.collected // 0')
          SKIPPED=$(printf '%s'   "$BODY" | jq -r '.skipped // 0')
          NUM_ERRORS=$(printf '%s' "$BODY" | jq -r '(.errors // []) | length')

          # 2) errors[] があれば内容を表示
          if [ "$NUM_ERRORS" -gt 0 ]; then
            echo "::warning::collect reported $NUM_ERRORS error(s):"
            printf '%s' "$BODY" | jq -r '.errors[]'
          fi

          # 3) 1本も収集できず、重複スキップもない＝実質失敗
          if [ "$COLLECTED" -lt 1 ] && [ "$SKIPPED" -lt 1 ]; then
            echo "::error::collected 0 articles and skipped 0 (nothing happened — see errors above)"
            exit 1
          fi

          # 4) 収集0だが重複スキップあり＝新着なし（正常）
          if [ "$COLLECTED" -lt 1 ]; then
            echo "ℹ️ no new article (skipped $SKIPPED duplicate(s))"
            exit 0
          fi

          echo "✅ collected $COLLECTED article(s)"
