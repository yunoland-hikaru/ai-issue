name: Daily Article Collection

on:
  schedule:
    - cron: '0 21 * * *'  # 毎日 21:00 UTC = 06:00 JST
  workflow_dispatch:       # 手動実行も可能

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Collect from AI Times (source=0)
        run: |
          curl -sf -X POST "https://ai-issue.vercel.app/api/collect?source=0&limit=5" \
            && echo "✓ AI Times done" || echo "✗ AI Times failed"

      - name: Wait 30s
        run: sleep 30

      - name: Collect from TechCrunch (source=1)
        run: |
          curl -sf -X POST "https://ai-issue.vercel.app/api/collect?source=1&limit=5" \
            && echo "✓ TechCrunch done" || echo "✗ TechCrunch failed"

      - name: Wait 30s
        run: sleep 30

      - name: Collect from VentureBeat (source=2)
        run: |
          curl -sf -X POST "https://ai-issue.vercel.app/api/collect?source=2&limit=5" \
            && echo "✓ VentureBeat done" || echo "✗ VentureBeat failed"

      - name: Wait 30s
        run: sleep 30

      - name: Collect from The Verge (source=3)
        run: |
          curl -sf -X POST "https://ai-issue.vercel.app/api/collect?source=3&limit=5" \
            && echo "✓ The Verge done" || echo "✗ The Verge failed"
