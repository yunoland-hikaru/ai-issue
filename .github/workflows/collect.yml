name: Newsroom-style Collection

on:
  schedule:
    # JST 08,10,12,14,16,18,20,22時 = UTC 23,1,3,5,7,9,11,13時。1日8スロット。
    - cron: '0 23,1,3,5,7,9,11,13 * * *'
  workflow_dispatch:       # 手動実行も可能（その場合は必ず1件収集）

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Maybe collect one article (newsroom-style)
        run: |
          # 実際の編集部のように、各スロットで確率的に0〜1本を不定の時間に収集する。
          # 手動実行(workflow_dispatch)は必ず収集。スケジュールは85%の確率で1本。
          # 1日8スロット × 採用率85% ≒ 1日6〜8本（5〜10本のレンジ）。
          if [ "${{ github.event_name }}" = "schedule" ] && [ $((RANDOM % 100)) -ge 85 ]; then
            echo "Skip this slot"
            exit 0
          fi

          # 0〜10分のランダム遅延で created_at を自然に散らす
          DELAY=$((RANDOM % 600))
          echo "Sleeping ${DELAY}s before collecting..."
          sleep "$DELAY"

          # ランダムなソースから1本（0=AI Times, 1=TechCrunch, 2=VentureBeat, 3=The Verge）
          SOURCE=$((RANDOM % 4))
          echo "→ collecting source=$SOURCE"
          curl -sS -X POST "https://ai-issue.vercel.app/api/collect?source=$SOURCE&limit=1"
