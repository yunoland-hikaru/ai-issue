name: Daily Article Collection

on:
  schedule:
    - cron: '0 21 * * *'  # 毎日 21:00 UTC = 06:00 JST
  workflow_dispatch:       # 手動実行も可能

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Collect 20 articles (4 sources x 5 rounds, 1 article each)
        run: |
          BASE="https://ai-issue.vercel.app/api/collect"
          for round in 1 2 3 4 5; do
            echo "=== Round $round/5 ==="
            for source in 0 1 2 3; do
              echo "→ source=$source"
              curl -sf -X POST "$BASE?source=$source&limit=1" || echo "  ✗ failed"
              if [ $round -lt 5 ] || [ $source -lt 3 ]; then
                sleep 30
              fi
            done
          done
