name: Newsroom-style Collection

on:
  # トリガーは外部cron(cron-job.org)からの workflow_dispatch のみ。
  # 以前は GitHub schedule もバックアップで併用していたが、両方発火して
  # 同一スロットで2本収集される二重トリガーが発生したため schedule は削除。
  workflow_dispatch:       # 外部cron(cron-job.org)からのトリガー & 手動実行
    inputs:
      force:
        description: '85%確率とランダム遅延を無効化して必ず収集（手動テスト用）'
        type: boolean
        default: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Maybe collect one article (newsroom-style)
        run: |
          # 実際の編集部のように、各スロットで確率的に0〜1本を不定の時間に収集する。
          # トリガー元はスケジュール or 外部cron(cron-job.org)からのworkflow_dispatch。
          # どちらも 85%確率で1本（force=true のときだけ必ず収集 = 手動テスト用）。
          # 1日12スロット(2時間毎) × 採用率85% ≒ 1日10本前後。
          FORCE="${{ github.event.inputs.force }}"
          if [ "$FORCE" != "true" ]; then
            if [ $((RANDOM % 100)) -ge 85 ]; then
              echo "Skip this slot"
              exit 0
            fi
            # 0〜10分のランダム遅延で created_at を自然に散らす
            DELAY=$((RANDOM % 600))
            echo "Sleeping ${DELAY}s before collecting..."
            sleep "$DELAY"
          else
            echo "force=true → skip probability & delay, collect now"
          fi

          # ランダムなソースから1本（0=TechCrunch,1=VentureBeat,2=The Decoder,3=Synced,4=AI Business,5=InfoQ）
          SOURCE=$((RANDOM % 6))
          echo "→ collecting source=$SOURCE"

          # レスポンス本文とHTTPコードを両方取得（無言失敗を防ぐ）
          RESPONSE=$(curl -sS --max-time 180 -w $'\n%{http_code}' \
            -X POST "https://ai-issue.vercel.app/api/collect?source=$SOURCE&limit=1")
          HTTP_CODE=$(printf '%s' "$RESPONSE" | tail -n1)
          BODY=$(printf '%s' "$RESPONSE" | sed '$d')
          echo "HTTP $HTTP_CODE"
          echo "$BODY"

          # 1) HTTPエラーは即失敗
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::collect returned HTTP $HTTP_CODE"
            exit 1
          fi

          COLLECTED=$(printf '%s' "$BODY" | jq -r '.collected // 0')
          SKIPPED=$(printf '%s'   "$BODY" | jq -r '.skipped // 0')
          NUM_ERRORS=$(printf '%s' "$BODY" | jq -r '(.errors // []) | length')

          # 2) errors[] があれば内容を表示
          if [ "$NUM_ERRORS" -gt 0 ]; then
            echo "::warning::collect reported $NUM_ERRORS error(s):"
            printf '%s' "$BODY" | jq -r '.errors[]'
          fi

          # 3) 1本も収集できず、重複スキップもない＝実質失敗
          if [ "$COLLECTED" -lt 1 ] && [ "$SKIPPED" -lt 1 ]; then
            echo "::error::collected 0 articles and skipped 0 (nothing happened — see errors above)"
            exit 1
          fi

          # 4) 収集0だが重複スキップあり＝新着なし（正常）
          if [ "$COLLECTED" -lt 1 ]; then
            echo "ℹ️ no new article (skipped $SKIPPED duplicate(s))"
            exit 0
          fi

          echo "✅ collected $COLLECTED article(s)"

      # 翻訳の後追い（ko/en）。
      # collect は 60秒(Vercel Hobby)に収めるため翻訳を行わず ja のみ保存する。ko/en は
      # ここで埋める。migrate-translations は最新順に走査するので、直前の collect で作った
      # 新規記事(ja のみ)が最優先で翻訳される＝新規記事も同 run 内・数十秒で ko/en が付く。
      # 空訳・日本語残留の既存記事の補正も兼ねる。
      # ・常に実行（収集をスキップ/失敗したスロットでも未訳記事は直す）= if: always()
      # ・このステップ自体は失敗させない（収集の成否と無関係。失敗メールのノイズを増やさない）
      # ・limit=2: 長文の Haiku 翻訳は1件 ≈ 25〜30秒。Vercel 60秒制限内に収めるため2件まで。
      #   （途中で切れても順次 DB 反映するので前の件は残る。12スロット×85%×2 ≈ 20件/日で
      #    新規 ~10件/日を上回り、過去の取りこぼしも徐々に解消する）
      - name: Backfill missing / residual translations
        if: always()
        run: |
          echo "→ translating ja-only / fixing JP-residue articles (ko/en)"
          RESPONSE=$(curl -sS --max-time 90 -w $'\n%{http_code}' \
            -X POST "https://ai-issue.vercel.app/api/migrate-translations?limit=2" || true)
          HTTP_CODE=$(printf '%s' "$RESPONSE" | tail -n1)
          BODY=$(printf '%s' "$RESPONSE" | sed '$d')
          echo "HTTP $HTTP_CODE"
          echo "$BODY"
          exit 0

      # 画像の後追い（保険）。collect は画像を best-effort で同 request 内に付けるが、
      # ごく稀に画像生成中に 60秒で打ち切られると image_url=null の記事が残る。これを補完する。
      # ・image_url=null が0件なら migrate-images は即返す（Sonnet を呼ばない＝平時はコスト0）。
      # ・limit=1: migrate-images は画像キーワード取得のため記事ごとに Sonnet を回す（重い）ので
      #   1件のみ。Vercel 60秒内に収める。
      # ・このステップ自体は失敗させない。
      - name: Backfill missing images
        if: always()
        run: |
          echo "→ filling articles with image_url=null"
          RESPONSE=$(curl -sS --max-time 90 -w $'\n%{http_code}' \
            -X POST "https://ai-issue.vercel.app/api/migrate-images?limit=1" || true)
          HTTP_CODE=$(printf '%s' "$RESPONSE" | tail -n1)
          BODY=$(printf '%s' "$RESPONSE" | sed '$d')
          echo "HTTP $HTTP_CODE"
          echo "$BODY"
          exit 0
